<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Photo Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1f1f22;
    --border: #2a2a2e;
    --accent: #d4a843;
    --accent2: #e8c87a;
    --text: #e8e6e1;
    --muted: #7a7872;
    --danger: #c0392b;
    --radius: 4px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,14,15,0.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 28px;
    height: 60px;
  }
  .topbar-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--accent);
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  .topbar-title span {
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    margin-left: 8px;
  }
  .topbar-spacer { flex: 1; }
  .sel-count {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    transition: color 0.2s;
  }
  .sel-count.active { color: var(--accent2); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.18s ease;
    text-transform: uppercase;
    white-space: nowrap;
    text-decoration: none;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #0e0e0f; font-weight: 500; }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); color: #0e0e0f; }
  .btn.active { border-color: var(--accent); color: var(--accent); }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: #fff; }

  /* ── GALLERY ── */
  #gallery { padding: 28px; }

  .gallery-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .gallery-meta h3 { font-family: 'Playfair Display', serif; font-size: 1rem; }
  .gallery-meta span { font-size: 0.72rem; color: var(--muted); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 4/3;
    transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    user-select: none;
  }
  .card:hover { border-color: #555; transform: translateY(-2px); }
  .card.selected {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 2px var(--accent);
    transform: translateY(-2px);
  }

  .card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  /* RAW placeholder */
  .raw-thumb {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--surface2);
    pointer-events: none;
  }
  .raw-thumb .ri { font-size: 2.2rem; }
  .raw-thumb .rb {
    font-size: 0.62rem;
    padding: 2px 10px;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 2px;
    letter-spacing: 0.12em;
  }
  .raw-thumb .rn {
    font-size: 0.65rem;
    color: var(--muted);
    max-width: 90%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: center;
  }

  /* Checkbox */
  .card-cb {
    position: absolute;
    top: 8px; left: 8px;
    width: 24px; height: 24px;
    border: 2px solid rgba(255,255,255,0.55);
    border-radius: 5px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .card:hover .card-cb { opacity: 1; }
  .card.selected .card-cb {
    opacity: 1;
    background: var(--accent);
    border-color: var(--accent);
  }
  .card.selected .card-cb::after {
    content: '';
    width: 10px; height: 6px;
    border-left: 2.5px solid #0e0e0f;
    border-bottom: 2.5px solid #0e0e0f;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  /* Filename label on hover */
  .card-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 18px 10px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.78));
    font-size: 0.63rem;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transition: opacity 0.18s;
    pointer-events: none;
  }
  .card:hover .card-label { opacity: 1; }

  /* Loading skeleton */
  .card-skeleton {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* Error state */
  .card-error {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; color: var(--muted); font-size: 0.65rem;
    background: var(--surface2);
  }

  /* ── LOADING / EMPTY STATES ── */
  .state-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 60px);
    gap: 16px;
    color: var(--muted);
    text-align: center;
  }
  .state-screen .big { font-size: 3rem; }
  .state-screen h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--text); }
  .state-screen p { font-size: 0.75rem; line-height: 1.8; max-width: 360px; }
  .spinner-ring {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(5,5,6,0.97);
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #lightbox.open { display: flex; animation: lbIn 0.2s ease; }
  @keyframes lbIn { from { opacity:0; transform:scale(0.98); } to { opacity:1; transform:scale(1); } }

  .lb-topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
  }
  .lb-info { flex: 1; overflow: hidden; }
  .lb-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lb-meta { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

  .lb-wrap {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 72px 72px;
  }
  .lb-wrap img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 2px;
    box-shadow: 0 32px 96px rgba(0,0,0,0.7);
    animation: imgIn 0.25s ease;
  }
  @keyframes imgIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }

  .lb-raw {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; text-align: center;
  }
  .lb-raw .icon { font-size: 5rem; }
  .lb-raw h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--accent); }
  .lb-raw p { font-size: 0.78rem; color: var(--muted); }

  /* Nav arrows */
  .lb-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 46px; height: 46px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.3rem;
    color: var(--text);
    transition: all 0.18s;
    user-select: none;
  }
  .lb-nav:hover { background: var(--accent); border-color: var(--accent); color: #0e0e0f; }
  .lb-prev { left: 16px; }
  .lb-next { right: 16px; }

  /* Bottom bar */
  .lb-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  }
  .lb-download-label {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .topbar { padding: 0 14px; gap: 8px; }
    #gallery { padding: 14px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    .lb-wrap { padding: 64px 48px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">GALLERY <span id="lbl-folder">/ Images</span></div>
  <div class="topbar-spacer"></div>
  <span class="sel-count" id="sel-count"></span>
  <button class="btn" id="btn-selmode" style="display:none" onclick="toggleSelectMode()">☐ Select</button>
  <button class="btn" id="btn-selall" style="display:none" onclick="toggleSelectAll()">Select All</button>
  <button class="btn primary" id="btn-dl-sel" disabled onclick="downloadSelected()">↓ Download Selected</button>
</div>

<!-- MAIN CONTENT -->
<div id="main"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="lb-topbar">
    <div class="lb-info">
      <div class="lb-name" id="lb-name"></div>
      <div class="lb-meta" id="lb-meta"></div>
    </div>
  </div>

  <div class="lb-wrap" id="lb-wrap"></div>

  <div class="lb-nav lb-prev" onclick="lbNav(-1)">&#8249;</div>
  <div class="lb-nav lb-next" onclick="lbNav(1)">&#8250;</div>

  <div class="lb-bottom">
    <span class="lb-download-label">Download</span>
    <a class="btn primary" id="lb-dl-btn" download>↓ Download</a>
    <button class="btn danger" onclick="closeLb()">✕ Exit</button>
  </div>
</div>

<script>
// ── STATE ──
let images = [];       // [{name, url, size, ext}, ...]
let curIdx  = 0;
let selected = new Set();
let selectMode = false;

const RAW_EXTS = new Set(['cr2','nef','raw','arw','dng','orf','rw2','pef']);

// ── BOOT ──
async function init() {
  showLoading();
  try {
    const res = await fetch('/api/images');
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    images = await res.json();
    if (images.length === 0) {
      showEmpty();
    } else {
      document.getElementById('btn-selmode').style.display = 'inline-flex';
      document.getElementById('btn-selall').style.display  = 'inline-flex';
      renderGallery();
    }
  } catch (err) {
    showError(err.message);
  }
}

function showLoading() {
  document.getElementById('main').innerHTML = `
    <div class="state-screen">
      <div class="spinner-ring"></div>
      <p>Loading images…</p>
    </div>`;
}

function showEmpty() {
  document.getElementById('main').innerHTML = `
    <div class="state-screen">
      <div class="big">📂</div>
      <h2>No images found</h2>
      <p>Make sure your images are inside the <strong>Images/</strong> folder next to this HTML file.</p>
    </div>`;
}

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div class="state-screen">
      <div class="big">⚠️</div>
      <h2>Could not load images</h2>
      <p>${msg}<br/><br/>Make sure <strong>server.py</strong> is running.</p>
    </div>`;
}

// ── GALLERY ──
function renderGallery() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.id = 'gallery';

  const meta = document.createElement('div');
  meta.className = 'gallery-meta';
  meta.innerHTML = `<h3>Images</h3><span>${images.length} file${images.length !== 1 ? 's' : ''}</span>`;
  wrap.appendChild(meta);

  const grid = document.createElement('div');
  grid.className = 'grid';
  grid.id = 'grid';

  images.forEach((img, i) => {
    grid.appendChild(makeCard(img, i));
  });

  wrap.appendChild(grid);
  main.appendChild(wrap);
}

function makeCard(img, i) {
  const isRaw = RAW_EXTS.has(img.ext.toLowerCase());
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${i}`;

  // Checkbox
  const cb = document.createElement('div');
  cb.className = 'card-cb';
  cb.title = 'Select';
  cb.addEventListener('click', e => { e.stopPropagation(); toggleSelect(i); });
  card.appendChild(cb);

  // Thumbnail
  if (isRaw) {
    const ph = document.createElement('div');
    ph.className = 'raw-thumb';
    ph.innerHTML = `<div class="ri">📷</div><div class="rb">${img.ext.toUpperCase()}</div><div class="rn">${img.name}</div>`;
    card.appendChild(ph);
  } else {
    const skel = document.createElement('div');
    skel.className = 'card-skeleton';
    card.appendChild(skel);

    const image = document.createElement('img');
    image.alt = img.name;
    image.loading = 'lazy';
    image.onload  = () => skel.remove();
    image.onerror = () => {
      skel.remove();
      const err = document.createElement('div');
      err.className = 'card-error';
      err.innerHTML = `<span style="font-size:1.5rem">🖼️</span><span>${img.name}</span>`;
      card.appendChild(err);
    };
    image.src = img.url;
    card.appendChild(image);
  }

  // Filename label
  const lbl = document.createElement('div');
  lbl.className = 'card-label';
  lbl.textContent = img.name;
  card.appendChild(lbl);

  // Click: select mode → select; otherwise → lightbox
  card.addEventListener('click', () => {
    if (selectMode) toggleSelect(i);
    else openLb(i);
  });

  return card;
}

// ── SELECTION ──
function toggleSelect(i) {
  const card = document.getElementById(`card-${i}`);
  if (!card) return;
  if (selected.has(i)) {
    selected.delete(i);
    card.classList.remove('selected');
  } else {
    selected.add(i);
    card.classList.add('selected');
  }
  updateSelUI();
}

function toggleSelectAll() {
  if (selected.size === images.length) {
    selected.clear();
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  } else {
    images.forEach((_, i) => selected.add(i));
    document.querySelectorAll('.card').forEach(c => c.classList.add('selected'));
  }
  updateSelUI();
}

function toggleSelectMode() {
  selectMode = !selectMode;
  const btn = document.getElementById('btn-selmode');
  if (selectMode) {
    btn.textContent = '☑ Select';
    btn.classList.add('active');
  } else {
    btn.textContent = '☐ Select';
    btn.classList.remove('active');
  }
}

function updateSelUI() {
  const n = selected.size;
  const countEl = document.getElementById('sel-count');
  const dlBtn   = document.getElementById('btn-dl-sel');
  const saBtn   = document.getElementById('btn-selall');

  countEl.textContent = n > 0 ? `${n} selected` : '';
  countEl.className   = n > 0 ? 'sel-count active' : 'sel-count';
  dlBtn.disabled      = n === 0;
  saBtn.textContent   = n === images.length ? 'Deselect All' : 'Select All';
}

// ── LIGHTBOX ──
function openLb(i) {
  curIdx = i;
  renderLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lbNav(dir) {
  curIdx = (curIdx + dir + images.length) % images.length;
  renderLb();
}

function renderLb() {
  const img   = images[curIdx];
  const isRaw = RAW_EXTS.has(img.ext.toLowerCase());

  document.getElementById('lb-name').textContent = img.name;
  document.getElementById('lb-meta').textContent =
    `${img.ext.toUpperCase()} · ${fmtBytes(img.size)} · ${curIdx + 1} / ${images.length}`;

  const wrap = document.getElementById('lb-wrap');
  wrap.innerHTML = '';

  if (isRaw) {
    wrap.innerHTML = `
      <div class="lb-raw">
        <div class="icon">📷</div>
        <h3>${img.ext.toUpperCase()} Raw File</h3>
        <p>${img.name}</p>
        <p style="margin-top:6px;font-size:0.7rem">Raw preview not supported in browsers · Download to open in Lightroom / Photoshop</p>
      </div>`;
  } else {
    const el = document.createElement('img');
    el.src = img.url;
    el.alt = img.name;
    wrap.appendChild(el);
  }

  // Download button
  const dlBtn = document.getElementById('lb-dl-btn');
  dlBtn.href     = img.url;
  dlBtn.download = img.name;

  // Show/hide nav
  const show = images.length > 1 ? 'flex' : 'none';
  document.querySelector('.lb-prev').style.display = show;
  document.querySelector('.lb-next').style.display = show;
}

// ── DOWNLOAD SELECTED ──
function downloadSelected() {
  selected.forEach(i => {
    const a = document.createElement('a');
    a.href     = images[i].url;
    a.download = images[i].name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => a.remove(), 300);
  });
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')      closeLb();
  if (e.key === 'ArrowLeft')   lbNav(-1);
  if (e.key === 'ArrowRight')  lbNav(1);
});

// ── HELPERS ──
function fmtBytes(b) {
  if (b < 1024)        return b + ' B';
  if (b < 1048576)     return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

// ── START ──
init();
</script>
</body>
</html>
